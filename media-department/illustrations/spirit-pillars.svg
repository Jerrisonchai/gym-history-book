<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="pillar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#f0d878"/>
    </linearGradient>
    <linearGradient id="pillar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f07b3f"/>
      <stop offset="100%" stop-color="#f9c88b"/>
    </linearGradient>
    <linearGradient id="pillar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e85d5d"/>
      <stop offset="100%" stop-color="#f07b7b"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="700" fill="#0a0e1a"/>
  
  <!-- Sun -->
  <circle cx="400" cy="80" r="80" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="80" r="50" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="24" letter-spacing="6">THREE PILLARS OF CHAOYANG SPIRIT</text>
  <text x="400" y="72" text-anchor="middle" fill="#f0d878" font-family="sans-serif" font-size="11" opacity="0.6">朝阳体操队 精神三大支柱</text>
  <line x1="100" y1="82" x2="700" y2="82" stroke="#d4a843" stroke-width="0.5" opacity="0.3"/>

  <!-- Pillar 1: GRIT -->
  <g transform="translate(50, 110)">
    <rect x="0" y="0" width="210" height="560" rx="10" fill="#0f1b3d" stroke="#d4a843" stroke-width="1.5" opacity="0.9"/>
    <!-- Pillar column -->
    <rect x="80" y="60" width="50" height="280" rx="4" fill="url(#pillar1)" opacity="0.4"/>
    <text x="105" y="350" text-anchor="middle" fill="#f0d878" font-family="serif" font-size="16">GRIT</text>
    
    <text x="105" y="40" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="18" font-weight="bold">🏋️ 师弟不二</text>
    <text x="105" y="58" text-anchor="middle" fill="#d4a843" font-family="sans-serif" font-size="10">Master-Disciple Bond</text>
    
    <!-- Attributes -->
    <text x="15" y="100" fill="#f0d878" font-family="sans-serif" font-size="12">➤  不放弃 (Never give up)</text>
    <text x="15" y="125" fill="#f0d878" font-family="sans-serif" font-size="12">➤  不怕苦 (Endure hardship)</text>
    <text x="15" y="150" fill="#f0d878" font-family="sans-serif" font-size="12">➤  拼搏精神 (Fighting spirit)</text>
    <text x="15" y="175" fill="#f0d878" font-family="sans-serif" font-size="12">➤  后辈传承 (Pass to juniors)</text>
    
    <!-- Quote -->
    <rect x="10" y="400" width="190" height="145" rx="6" fill="#162447" opacity="0.6"/>
    <text x="105" y="425" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" font-style="italic">"Master and disciple</text>
    <text x="105" y="442" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" font-style="italic">are inseparable —</text>
    <text x="105" y="459" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" font-style="italic">every performance</text>
    <text x="105" y="476" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" font-style="italic">answers the mentor."</text>
    
    <!-- Horizontal connector line -->
    <line x1="210" y1="280" x2="220" y2="280" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Pillar 2: UNITY -->
  <g transform="translate(295, 110)">
    <rect x="0" y="0" width="210" height="560" rx="10" fill="#0f1b3d" stroke="#f07b3f" stroke-width="1.5" opacity="0.9"/>
    <rect x="80" y="60" width="50" height="280" rx="4" fill="url(#pillar2)" opacity="0.4"/>
    <text x="105" y="350" text-anchor="middle" fill="#f9c88b" font-family="serif" font-size="16">UNITY</text>
    
    <text x="105" y="40" text-anchor="middle" fill="#f07b3f" font-family="serif" font-size="18" font-weight="bold">🤝 异体同心</text>
    <text x="105" y="58" text-anchor="middle" fill="#f07b3f" font-family="sans-serif" font-size="10">Different Bodies, One Heart</text>
    
    <text x="15" y="100" fill="#f9c88b" font-family="sans-serif" font-size="12">➤  共同目标 (Shared goal)</text>
    <text x="15" y="125" fill="#f9c88b" font-family="sans-serif" font-size="12">➤  坚韧(Resilience)</text>
    <text x="15" y="150" fill="#f9c88b" font-family="sans-serif" font-size="12">➤  信任 (Trust)</text>
    <text x="15" y="175" fill="#f9c88b" font-family="sans-serif" font-size="12">➤  内圈(Inner circle)</text>
    
    <rect x="10" y="400" width="190" height="145" rx="6" fill="#162447" opacity="0.6"/>
    <text x="105" y="425" text-anchor="middle" fill="#f07b3f" font-family="serif" font-size="11" font-style="italic">"Many bodies,</text>
    <text x="105" y="442" text-anchor="middle" fill="#f07b3f" font-family="serif" font-size="11" font-style="italic">one heart —</text>
    <text x="105" y="459" text-anchor="middle" fill="#f07b3f" font-family="serif" font-size="11" font-style="italic">the base trusts the top,</text>
    <text x="105" y="476" text-anchor="middle" fill="#f07b3f" font-family="serif" font-size="11" font-style="italic">the top trusts the base."</text>
    
    <line x1="210" y1="280" x2="220" y2="280" stroke="#f07b3f" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Pillar 3: FAITH -->
  <g transform="translate(540, 110)">
    <rect x="0" y="0" width="210" height="560" rx="10" fill="#0f1b3d" stroke="#e85d5d" stroke-width="1.5" opacity="0.9"/>
    <rect x="80" y="60" width="50" height="280" rx="4" fill="url(#pillar3)" opacity="0.4"/>
    <text x="105" y="350" text-anchor="middle" fill="#f07b7b" font-family="serif" font-size="16">FAITH</text>
    
    <text x="105" y="40" text-anchor="middle" fill="#e85d5d" font-family="serif" font-size="18" font-weight="bold">🔴 虚空会的宝塔</text>
    <text x="105" y="58" text-anchor="middle" fill="#e85d5d" font-family="sans-serif" font-size="10">Treasure Tower Ceremony</text>
    
    <text x="15" y="100" fill="#f07b7b" font-family="sans-serif" font-size="12">➤  御本尊(Gohonzon)</text>
    <text x="15" y="125" fill="#f07b7b" font-family="sans-serif" font-size="12">➤  题目(Daimoku)</text>
    <text x="15" y="150" fill="#f07b7b" font-family="sans-serif" font-size="12">➤  5AM勤行(Gongyo)</text>
    <text x="15" y="175" fill="#f07b7b" font-family="sans-serif" font-size="12">➤  胜利(Buddhist victory)</text>
    
    <rect x="10" y="400" width="190" height="145" rx="6" fill="#162447" opacity="0.6"/>
    <text x="105" y="425" text-anchor="middle" fill="#e85d5d" font-family="serif" font-size="11" font-style="italic">"The tower is</text>
    <text x="105" y="442" text-anchor="middle" fill="#e85d5d" font-family="serif" font-size="11" font-style="italic">the Treasure Tower</text>
    <text x="105" y="459" text-anchor="middle" fill="#e85d5d" font-family="serif" font-size="11" font-style="italic">that appears</text>
    <text x="105" y="476" text-anchor="middle" fill="#e85d5d" font-family="serif" font-size="11" font-style="italic">in the sky."</text>
  </g>

  <!-- Bottom unification bar -->
  <rect x="50" y="680" width="700" height="4" rx="2" fill="#d4a843" opacity="0.5"/>
  <text x="400" y="698" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" opacity="0.6">Together: The Tower becomes a symbol of Human Revolution, Peace, and Victory</text>
</svg>
