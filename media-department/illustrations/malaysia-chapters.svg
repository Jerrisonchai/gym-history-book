<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700">
  <rect width="500" height="700" fill="#0a0e1a"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="18" letter-spacing="4">STATE CHAPTERS</text>
  <text x="250" y="48" text-anchor="middle" fill="#f0d878" font-family="sans-serif" font-size="9" opacity="0.6">朝阳体操队 · Chapter Locations</text>
  
  <!-- Simplified Malaysia outline -->
  <g transform="translate(30, 70)">
    <!-- Peninsular Malaysia (simplified polygon) -->
    <polygon points="220,10 240,40 255,60 260,90 250,120 235,150 220,180 230,210 250,230 260,260 255,290 240,310 220,330 200,340 180,330 160,310 150,290 145,260 140,230 150,200 155,170 160,140 170,110 180,80 190,50" fill="#0f1b3d" stroke="#d4a843" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Sabah (top right) -->
    <polygon points="30,40 10,60 15,90 30,110 50,120 70,110 80,90 70,65 50,45" fill="#0f1b3d" stroke="#d4a843" stroke-width="1.5" opacity="0.8"/>
    <text x="45" y="95" text-anchor="middle" fill="#f0d878" font-family="sans-serif" font-size="7">SABAH ★</text>
    
    <!-- Sarawak -->
    <polygon points="30,140 10,160 20,190 40,210 60,215 75,200 80,175 70,155 50,145" fill="#0f1b3d" stroke="#d4a843" stroke-width="1.5" opacity="0.8"/>
    <text x="47" y="185" text-anchor="middle" fill="#f0d878" font-family="sans-serif" font-size="7">SARAWAK</text>
    
    <!-- State labels and chapter markers -->
    <!-- PERLIS -->
    <circle cx="210" cy="22" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="220" y="25" fill="#f0d878" font-family="sans-serif" font-size="7">Perlis</text>
    
    <!-- KEDAH -->
    <circle cx="200" cy="42" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="210" y="45" fill="#f0d878" font-family="sans-serif" font-size="7">Kedah</text>
    
    <!-- PENANG ★ -->
    <circle cx="195" cy="70" r="6" fill="#f07b3f" stroke="#f9c88b" stroke-width="1"/>
    <text x="207" y="73" fill="#f9c88b" font-family="sans-serif" font-size="8" font-weight="bold">Penang ★</text>
    <text x="207" y="83" fill="#f0d878" font-family="sans-serif" font-size="6" opacity="0.6">1986 Festival</text>
    
    <!-- KELANTAN -->
    <circle cx="255" cy="55" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="265" y="58" fill="#f0d878" font-family="sans-serif" font-size="7">Kelantan</text>
    
    <!-- TERENGGANU -->
    <circle cx="260" cy="80" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="270" y="83" fill="#f0d878" font-family="sans-serif" font-size="7">Terengganu</text>
    
    <!-- PERAK ★ -->
    <circle cx="185" cy="110" r="6" fill="#f07b3f" stroke="#f9c88b" stroke-width="1"/>
    <text x="197" y="113" fill="#f9c88b" font-family="sans-serif" font-size="8" font-weight="bold">Perak ★</text>
    <text x="197" y="123" fill="#f0d878" font-family="sans-serif" font-size="6" opacity="0.6">1988 Ipoh</text>
    
    <!-- PAHANG ★ -->
    <circle cx="235" cy="140" r="6" fill="#f07b3f" stroke="#f9c88b" stroke-width="1"/>
    <text x="247" y="143" fill="#f9c88b" font-family="sans-serif" font-size="8" font-weight="bold">Pahang ★</text>
    <text x="247" y="153" fill="#f0d878" font-family="sans-serif" font-size="6" opacity="0.6">1990 Kuantan</text>
    
    <!-- SELANGOR -->
    <circle cx="195" cy="165" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="207" y="168" fill="#f0d878" font-family="sans-serif" font-size="7">Selangor</text>
    
    <!-- KL ★★★ -->
    <circle cx="200" cy="185" r="8" fill="#e85d5d" stroke="#fff" stroke-width="1.5"/>
    <text x="212" y="188" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">KUALA LUMPUR</text>
    <text x="212" y="200" fill="#f0d878" font-family="sans-serif" font-size="6" opacity="0.7">HQ · 700+ men · 1989</text>
    
    <!-- NEGERI SEMBILAN -->
    <circle cx="215" cy="225" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="227" y="228" fill="#f0d878" font-family="sans-serif" font-size="7">Negeri Sembilan</text>
    
    <!-- MELAKA -->
    <circle cx="220" cy="255" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="230" y="258" fill="#f0d878" font-family="sans-serif" font-size="7">Melaka</text>
    
    <!-- JOHOR ★ -->
    <circle cx="245" cy="295" r="6" fill="#f07b3f" stroke="#f9c88b" stroke-width="1"/>
    <text x="257" y="298" fill="#f9c88b" font-family="sans-serif" font-size="8" font-weight="bold">Johor ★</text>
    <text x="257" y="308" fill="#f0d878" font-family="sans-serif" font-size="6" opacity="0.6">1989 Rain · 500 men</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30, 470)">
    <text x="0" y="0" fill="#d4a843" font-family="serif" font-size="12" font-weight="bold">Legend</text>
    <circle cx="8" cy="18" r="5" fill="#e85d5d" stroke="#fff" stroke-width="1"/>
    <text x="20" y="22" fill="#f0d878" font-family="sans-serif" font-size="9">HQ / Major Event</text>
    <circle cx="8" cy="38" r="5" fill="#f07b3f" stroke="#f9c88b" stroke-width="1"/>
    <text x="20" y="42" fill="#f0d878" font-family="sans-serif" font-size="9">Festival Host</text>
    <circle cx="8" cy="58" r="4" fill="#d4a843" opacity="0.5"/>
    <text x="20" y="61" fill="#f0d878" font-family="sans-serif" font-size="9">Chapter (data pending)</text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(280, 470)">
    <rect x="0" y="0" width="180" height="110" rx="6" fill="#0f1b3d" stroke="#d4a843" stroke-width="0.5" opacity="0.8"/>
    <text x="90" y="20" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="11" font-weight="bold">📊 State Summary</text>
    <text x="15" y="40" fill="#f0d878" font-family="sans-serif" font-size="8">Known chapters: 5/13</text>
    <text x="15" y="55" fill="#f0d878" font-family="sans-serif" font-size="8">Data pending: 8/13</text>
    <text x="15" y="70" fill="#f0d878" font-family="sans-serif" font-size="8">Festival hosts: 4</text>
    <text x="15" y="85" fill="#f0d878" font-family="sans-serif" font-size="8">Peak: 2,200 (1989)</text>
    <text x="15" y="100" fill="#f0d878" font-family="sans-serif" font-size="7" opacity="0.5">★ = Festival host verified</text>
  </g>

  <!-- Footer -->
  <text x="250" y="685" text-anchor="middle" fill="#d4a843" font-family="sans-serif" font-size="7" opacity="0.4">SGM Gym History Book · State Chapter Map · Updated 2026</text>
</svg>
