<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="castellsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#castellsBg)"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="22" letter-spacing="6">CASTELLS vs CHAOYANG</text>
  <text x="500" y="62" text-anchor="middle" fill="#4ecdc4" font-family="sans-serif" font-size="12">East Meets West — Two Human Tower Traditions</text>
  <line x1="150" y1="72" x2="850" y2="72" stroke="#4ecdc4" stroke-width="0.5" opacity="0.4"/>

  <!-- LEFT: Castells -->
  <rect x="60" y="90" width="420" height="480" rx="8" fill="#0f1b3d" stroke="#4ecdc4" stroke-width="1" opacity="0.8"/>
  <text x="270" y="120" text-anchor="middle" fill="#4ecdc4" font-family="serif" font-size="18">🇪🇸 Castells · Catalonia</text>
  
  <!-- Castells tower silhouette -->
  <g transform="translate(210, 140)">
    <!-- Base pinya -->
    <ellipse cx="0" cy="90" rx="70" ry="15" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="-50" cy="85" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <ellipse cx="-30" cy="82" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <ellipse cx="-10" cy="80" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <ellipse cx="10" cy="78" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <ellipse cx="30" cy="80" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <ellipse cx="50" cy="85" rx="5" ry="8" fill="#4ecdc4" opacity="0.3"/>
    <!-- Levels 1-8 -->
    <rect x="-8" y="58" width="16" height="12" rx="3" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-6" y="44" width="12" height="12" rx="3" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-6" y="32" width="12" height="10" rx="3" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-5" y="22" width="10" height="9" rx="3" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-5" y="14" width="10" height="7" rx="3" fill="#4ecdc4" opacity="0.5"/>
    <rect x="-4" y="8" width="8" height="6" rx="2" fill="#4ecdc4" opacity="0.4"/>
    <rect x="-3" y="3" width="6" height="5" rx="2" fill="#4ecdc4" opacity="0.3"/>
    <rect x="-2" y="-1" width="4" height="4" rx="1" fill="#fff" opacity="0.6"/>
    <text x="0" y="118" text-anchor="middle" fill="#4ecdc4" font-size="10">10 levels max</text>
  </g>

  <!-- Castells stats -->
  <g transform="translate(80, 290)">
    <text x="0" y="0" fill="#e8c456" font-family="serif" font-size="13">📅  18th Century</text>
    <text x="0" y="20" fill="#e8c456" font-family="serif" font-size="13">🌍  UNESCO Heritage (2010)</text>
    <text x="0" y="40" fill="#e8c456" font-family="serif" font-size="13">🎵  Gralla (woodwind)</text>
    <text x="0" y="60" fill="#e8c456" font-family="serif" font-size="13">🏛  Civic Tradition</text>
    <text x="0" y="80" fill="#e8c456" font-family="serif" font-size="13">👥  Hundreds in pinya</text>
    <text x="0" y="100" fill="#e8c456" font-family="serif" font-size="13">🎯  Competition-driven</text>
  </g>

  <!-- Castells bottom text -->
  <text x="270" y="555" text-anchor="middle" fill="#4ecdc4" font-family="sans-serif" font-size="10" opacity="0.6">National pride · Folk · Secular</text>

  <!-- DIVIDER -->
  <line x1="500" y1="100" x2="500" y2="555" stroke="#f0d878" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <circle cx="500" cy="325" r="18" fill="#162447" stroke="#f0d878" stroke-width="1.5"/>
  <text x="500" y="319" text-anchor="middle" fill="#f0d878" font-size="16">VS</text>

  <!-- RIGHT: Chaoyang -->
  <rect x="520" y="90" width="420" height="480" rx="8" fill="#0f1b3d" stroke="#d4a843" stroke-width="1" opacity="0.8"/>
  <text x="730" y="120" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="18">🇲🇾 朝阳体操队 · Malaysia</text>
  
  <!-- Chaoyang tower silhouette -->
  <g transform="translate(720, 140)">
    <!-- Base -->
    <ellipse cx="0" cy="90" rx="60" ry="12" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="-40" cy="86" rx="5" ry="8" fill="#e85d5d" opacity="0.5"/>
    <ellipse cx="-20" cy="83" rx="5" ry="8" fill="#e85d5d" opacity="0.5"/>
    <ellipse cx="0" cy="81" rx="5" ry="8" fill="#e85d5d" opacity="0.5"/>
    <ellipse cx="20" cy="83" rx="5" ry="8" fill="#e85d5d" opacity="0.5"/>
    <ellipse cx="40" cy="86" rx="5" ry="8" fill="#e85d5d" opacity="0.5"/>
    <!-- Levels -->
    <ellipse cx="-25" cy="62" rx="4" ry="7" fill="#e85d5d" opacity="0.6"/>
    <ellipse cx="-5" cy="60" rx="4" ry="7" fill="#e85d5d" opacity="0.6"/>
    <ellipse cx="15" cy="60" rx="4" ry="7" fill="#e85d5d" opacity="0.6"/>
    <ellipse cx="25" cy="62" rx="4" ry="7" fill="#e85d5d" opacity="0.6"/>
    <rect x="-10" y="42" width="20" height="12" rx="3" fill="#d4a843" opacity="0.7"/>
    <rect x="-7" y="30" width="14" height="10" rx="3" fill="#d4a843" opacity="0.7"/>
    <rect x="-5" y="20" width="10" height="9" rx="3" fill="#e8c456" opacity="0.7"/>
    <circle cx="0" cy="10" r="5" fill="#f0d878" opacity="0.8"/>
    <!-- Sun rays -->
    <line x1="-12" y1="2" x2="-20" y2="-8" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-2" x2="0" y2="-14" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="2" x2="20" y2="-8" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <text x="0" y="118" text-anchor="middle" fill="#d4a843" font-size="10">6 levels max</text>
  </g>

  <!-- Chaoyang stats -->
  <g transform="translate(540, 290)">
    <text x="0" y="0" fill="#e8c456" font-family="serif" font-size="13">📅  1976</text>
    <text x="0" y="20" fill="#e8c456" font-family="serif" font-size="13">🕉   Buddhist Practice</text>
    <text x="0" y="40" fill="#e8c456" font-family="serif" font-size="13">🎵  Choreographed Music</text>
    <text x="0" y="60" fill="#e8c456" font-family="serif" font-size="13">🧘  Spiritual Tradition</text>
    <text x="0" y="80" fill="#e8c456" font-family="serif" font-size="13">👥  5-man Base Circles</text>
    <text x="0" y="100" fill="#e8c456" font-family="serif" font-size="13">✊  Faith-driven</text>
  </g>

  <!-- Chaoyang bottom text -->
  <text x="730" y="555" text-anchor="middle" fill="#d4a843" font-family="sans-serif" font-size="10" opacity="0.6">Buddhist · Cultural · Spiritual</text>

  <!-- Shared Values Bar -->
  <rect x="60" y="580" width="880" height="18" rx="4" fill="#0f1b3d" opacity="0.5"/>
  <text x="500" y="593" text-anchor="middle" fill="#f0d878" font-family="serif" font-size="11">🤝  SHARED: Trust · Discipline · Intergenerational Transfer · Community Identity · Human Achievement</text>
</svg>
